name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  DOCKER_IMAGE: ghcr.io/lordmike/hass-vue
  DOCKER_PLATFORMS: linux/amd64,linux/arm64

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release-tag.outputs.tag }}

    steps:
      - name: Resolve release tag
        id: release-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if ! printf '%s' "$TAG" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Home Assistant release tags must match a.b.c with numeric components, for example 1.2.3. Do not use the usual vA.B.C prefix."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  app:
    name: Validate app
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Verify version metadata
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
          PACKAGE_VERSION="$(node -p "require('./app/package.json').version")"

          if [ "$PACKAGE_VERSION" != "$TAG" ]; then
            echo "::error::app/package.json version $PACKAGE_VERSION does not match tag $TAG"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci --ignore-scripts

      - name: Validate
        working-directory: app
        run: npm run validate

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - validate
      - app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
          fetch-depth: 0

      - name: Verify tag is on master
        run: |
          git fetch origin master
          git merge-base --is-ancestor HEAD origin/master

      - name: Get previous version tag
        id: previous-tag
        run: |
          PREV_TAG="$(git tag --merged HEAD --list '[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | grep -Ex '[0-9]+\.[0-9]+\.[0-9]+' | grep -vFx '${{ needs.validate.outputs.tag }}' | head -n1 || true)"
          echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          CURRENT_TAG="${{ needs.validate.outputs.tag }}"
          PREV_TAG="${{ steps.previous-tag.outputs.tag }}"

          echo "**Changes Since Last Release:**" > release.md
          if [ -n "$PREV_TAG" ]; then
            echo "[View changes $PREV_TAG...$CURRENT_TAG](https://github.com/${{ github.repository }}/compare/$PREV_TAG...$CURRENT_TAG)" >> release.md
            LOG_RANGE="$PREV_TAG...$CURRENT_TAG"
          else
            echo "Initial release for $CURRENT_TAG." >> release.md
            LOG_RANGE="$CURRENT_TAG"
          fi

          echo "" >> release.md
          echo "**Commits:**" >> release.md
          git log --pretty=format:"- %h: %s" "$LOG_RANGE" >> release.md

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.validate.outputs.tag }}
          name: ${{ needs.validate.outputs.tag }}
          bodyFile: release.md
          allowUpdates: true

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs:
      - validate
      - app
      - release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          build-args: |
            HASS_VERSION=${{ needs.validate.outputs.tag }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ needs.validate.outputs.tag }}
            ${{ env.DOCKER_IMAGE }}:latest
