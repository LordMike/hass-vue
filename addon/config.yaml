name: hass-vue
version: 0.1.0
slug: hass-vue
description: Build Vue pages into Home Assistant custom cards, panels, and browser modules
url: https://github.com/LordMike/hass-vue
image: ghcr.io/lordmike/hass-vue
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
apparmor: false
ingress: true
ingress_port: 8099
panel_icon: mdi:tablet-dashboard
map:
  - type: homeassistant_config
    read_only: false
    path: /ha-config
options:
  dev_server: false
  log_level: info
  create_example: true
  source_root: /config/hass-vue
  output_root: /config/www/hass-vue
schema:
  dev_server: bool
  log_level: list(info|debug)
  create_example: bool
  source_root: str
  output_root: str
